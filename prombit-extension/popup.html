<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prombit</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">

    <header>
      <div class="logo">
        <img src="icons/icon48.png" alt="Prombit" width="18" height="18" style="object-fit:contain;display:block;">
        <span>Prombit</span>
      </div>
      <div class="version">v1.0</div>
    </header>

    <!-- Enable toggle -->
    <section class="section">
      <div class="toggle-row">
        <div>
          <div class="label">Extension enabled</div>
          <div class="sublabel">Show the improve button on AI sites</div>
        </div>
        <label class="toggle">
          <input type="checkbox" id="enabled-toggle" checked>
          <span class="toggle-slider"></span>
        </label>
      </div>
    </section>

    <!-- Auto mode toggle -->
    <section class="section">
      <div class="toggle-row">
        <div>
          <div class="label">Auto-suggest mode</div>
          <div class="sublabel">Show improvement badge as you type</div>
        </div>
        <label class="toggle">
          <input type="checkbox" id="auto-toggle">
          <span class="toggle-slider"></span>
        </label>
      </div>
    </section>

    <!-- Save button -->
    <div class="save-row">
      <button class="save-btn" id="save-btn">Save settings</button>
      <span class="save-status" id="save-status"></span>
    </div>

    <!-- Shortcut hint -->
    <div class="shortcut-hint">
      <kbd>Ctrl</kbd>+<kbd>Shift</kbd>+<kbd>P</kbd> to improve prompt
    </div>

    <!-- Status indicator -->
    <div class="status-bar" id="status-bar">
      <div class="status-dot ready" id="status-dot"></div>
      <span id="status-text">Connected to Prombit Cloud</span>
    </div>

  </div>
  <script src="src/popup/popup.js"></script>
</body>
</html>
